name: Publish Standalone Executable

on:
  release:
    types: [created]

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: VenEl_SwaMCP-linux
            file_extension: ""
          - os: windows-latest
            asset_name: VenEl_SwaMCP-windows
            file_extension: ".exe"
          - os: macos-latest
            asset_name: VenEl_SwaMCP-macos
            file_extension: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --onefile --name ${{ matrix.asset_name }} src/server.py

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}${{ matrix.file_extension }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
